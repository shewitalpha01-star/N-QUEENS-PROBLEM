<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <rect width="600" height="380" fill="#0D1117"/>
  <text x="300" y="30" text-anchor="middle" font-family="Segoe UI,Arial" font-size="15" font-weight="bold" fill="#58A6FF">N-Queens — Distinct Solutions per Board Size</text>
  <text x="300" y="50" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" fill="#8B949E">Backtracking with pruning · O(N!) worst case</text>

  <!-- Y gridlines -->
  <line x1="80" y1="70" x2="560" y2="70" stroke="#21262D" stroke-width="1"/>
  <line x1="80" y1="120" x2="560" y2="120" stroke="#21262D" stroke-width="1"/>
  <line x1="80" y1="170" x2="560" y2="170" stroke="#21262D" stroke-width="1"/>
  <line x1="80" y1="220" x2="560" y2="220" stroke="#21262D" stroke-width="1"/>
  <line x1="80" y1="270" x2="560" y2="270" stroke="#21262D" stroke-width="1"/>
  <line x1="80" y1="310" x2="560" y2="310" stroke="#30363D" stroke-width="1"/>

  <!-- Y labels -->
  <text x="72" y="74" text-anchor="end" font-family="Segoe UI,Arial" font-size="10" fill="#8B949E">15000</text>
  <text x="72" y="124" text-anchor="end" font-family="Segoe UI,Arial" font-size="10" fill="#8B949E">12000</text>
  <text x="72" y="174" text-anchor="end" font-family="Segoe UI,Arial" font-size="10" fill="#8B949E">9000</text>
  <text x="72" y="224" text-anchor="end" font-family="Segoe UI,Arial" font-size="10" fill="#8B949E">6000</text>
  <text x="72" y="274" text-anchor="end" font-family="Segoe UI,Arial" font-size="10" fill="#8B949E">3000</text>
  <text x="72" y="314" text-anchor="end" font-family="Segoe UI,Arial" font-size="10" fill="#8B949E">0</text>

  <!-- Bars: max=14200, chart height=240, scale=240/15000=0.016 -->
  <!-- N=8: 92 → h=1.5 → y=308 -->
  <rect x="140" y="308" width="80" height="2" fill="#58A6FF" rx="2"/>
  <text x="180" y="302" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" fill="white">92</text>
  <text x="180" y="330" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" font-weight="bold" fill="#E6EDF3">N=8</text>

  <!-- N=10: 724 → h=11.6 → y=298 -->
  <rect x="260" y="298" width="80" height="12" fill="#E67E22" rx="2"/>
  <text x="300" y="292" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" fill="white">724</text>
  <text x="300" y="330" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" font-weight="bold" fill="#E6EDF3">N=10</text>

  <!-- N=12: 14200 → h=227 → y=83 -->
  <rect x="380" y="83" width="80" height="227" fill="#8B0000" rx="2"/>
  <text x="420" y="77" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" fill="white">14,200</text>
  <text x="420" y="330" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" font-weight="bold" fill="#E6EDF3">N=12</text>

  <!-- Axes -->
  <line x1="80" y1="310" x2="560" y2="310" stroke="#30363D" stroke-width="2"/>
  <line x1="80" y1="60" x2="80" y2="310" stroke="#30363D" stroke-width="2"/>

  <!-- Legend -->
  <text x="300" y="360" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" fill="#8B949E">Solutions grow exponentially — pruning makes N=12 feasible in under 1 second</text>
</svg>
