  <rect x="154" y="280" width="52" height="52" fill="#EEEED2"/>
  <rect x="206" y="280" width="52" height="52" fill="#769656"/>
  <rect x="258" y="280" width="52" height="52" fill="#EEEED2"/>
  <rect x="310" y="280" width="52" height="52" fill="#769656"/>
  <rect x="362" y="280" width="52" height="52" fill="#EEEED2"/>
  <rect x="414" y="280" width="52" height="52" fill="#769656"/>
