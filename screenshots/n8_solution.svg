  </text>
  <text x="270" y="568" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="10" fill="#8b949e">
    Aksum University, AIT  ·  Design and Analysis of Algorithms
  </text>
  <text x="270" y="584" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="10" fill="#8b949e">
    Weldearegay Gebrey · Eyerusalem Teklay · Shewit Legese
  </text>
</svg>
