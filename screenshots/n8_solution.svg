  <rect x="362" y="72"  width="52" height="52" fill="#EEEED2"/>
  <rect x="414" y="72"  width="52" height="52" fill="#769656"/>
  <!-- Row 1 -->
  <rect x="50"  y="124" width="52" height="52" fill="#769656"/>
  <rect x="102" y="124" width="52" height="52" fill="#EEEED2"/>
  <rect x="154" y="124" width="52" height="52" fill="#769656"/>
  <rect x="206" y="124" width="52" height="52" fill="#EEEED2"/>
  <rect x="258" y="124" width="52" height="52" fill="#769656"/>
