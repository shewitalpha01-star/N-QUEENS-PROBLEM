<svg xmlns="http://www.w3.org/2000/svg" width="540" height="600" viewBox="0 0 540 600">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8a96e"/>
      <stop offset="50%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#6b4f10"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="540" height="600" rx="14" fill="url(#bgGrad)"/>
  <!-- Subtle border -->
  <rect width="540" height="600" rx="14" fill="none" stroke="#30363d" stroke-width="1.5"/>

  <!-- Header area -->
  <rect x="0" y="0" width="540" height="58" rx="14" fill="#161b22"/>
  <rect x="0" y="44" width="540" height="14" fill="#161b22"/>
  <!-- Traffic lights -->
  <circle cx="22" cy="26" r="7" fill="#ff5f57"/>
  <circle cx="44" cy="26" r="7" fill="#febc2e"/>
  <circle cx="66" cy="26" r="7" fill="#28c840"/>
  <!-- Title -->
  <text x="270" y="22" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="14" font-weight="bold" fill="#58A6FF">N-Queens Problem Solver</text>
  <text x="270" y="40" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
        font-size="11" fill="#8b949e">N = 8  ·  Solution #1  ·  board = [0, 4, 7, 5, 2, 6, 1, 3]</text>

  <!-- Board wood frame with gradient -->
  <rect x="46" y="68" width="432" height="432" rx="5" fill="url(#frameGrad)" filter="url(#shadow)"/>

  <!-- Board cells: 8×8, cell=52px, top-left=(50,72) -->
  <!-- Row 0 -->
  <rect x="50"  y="72"  width="52" height="52" fill="#EEEED2"/>
  <rect x="102" y="72"  width="52" height="52" fill="#769656"/>
  <rect x="154" y="72"  width="52" height="52" fill="#EEEED2"/>
  <rect x="206" y="72"  width="52" height="52" fill="#769656"/>
