  <rect x="362" y="436" width="52" height="52" fill="#769656"/>
  <rect x="414" y="436" width="52" height="52" fill="#EEEED2"/>

  <!-- Queens: board=[0,4,7,5,2,6,1,3]
       cell center x = 50 + col*52 + 26
       cell center y = 72 + row*52 + 26
       queen text baseline ≈ center_y + 13  -->
  <!-- Row0,Col0: cx=76,  cy=98  → y=111 -->
  <text x="76"  y="111" text-anchor="middle" font-size="38" fill="#FFD700" filter="url(#shadow)" font-family="serif">♛</text>
  <!-- Row1,Col4: cx=284, cy=150 → y=163 -->
  <text x="284" y="163" text-anchor="middle" font-size="38" fill="#FFD700" filter="url(#shadow)" font-family="serif">♛</text>
  <!-- Row2,Col7: cx=440, cy=202 → y=215 -->
  <text x="440" y="215" text-anchor="middle" font-size="38" fill="#FFD700" filter="url(#shadow)" font-family="serif">♛</text>
  <!-- Row3,Col5: cx=336, cy=254 → y=267 -->
  <text x="336" y="267" text-anchor="middle" font-size="38" fill="#FFD700" filter="url(#shadow)" font-family="serif">♛</text>
  <!-- Row4,Col2: cx=180, cy=306 → y=319 -->
  <text x="180" y="319" text-anchor="middle" font-size="38" fill="#FFD700" filter="url(#shadow)" font-family="serif">♛</text>
  <!-- Row5,Col6: cx=388, cy=358 → y=371 -->
  <text x="388" y="371" text-anchor="middle" font-size="38" fill="#FFD700" filter="url(#shadow)" font-family="serif">♛</text>
  <!-- Row6,Col1: cx=128, cy=410 → y=423 -->
  <text x="128" y="423" text-anchor="middle" font-size="38" fill="#FFD700" filter="url(#shadow)" font-family="serif">♛</text>
  <!-- Row7,Col3: cx=232, cy=462 → y=475 -->
  <text x="232" y="475" text-anchor="middle" font-size="38" fill="#FFD700" filter="url(#shadow)" font-family="serif">♛</text>

  <!-- File labels a–h (bottom of board) -->
  <text x="76"  y="514" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#c9a84c">a</text>
  <text x="128" y="514" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#c9a84c">b</text>
  <text x="180" y="514" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#c9a84c">c</text>
  <text x="232" y="514" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#c9a84c">d</text>
  <text x="284" y="514" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#c9a84c">e</text>
  <text x="336" y="514" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#c9a84c">f</text>
  <text x="388" y="514" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#c9a84c">g</text>
  <text x="440" y="514" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#c9a84c">h</text>

  <!-- Rank labels 8–1 (left of board) -->
  <text x="32" y="103" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#c9a84c">8</text>
  <text x="32" y="155" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#c9a84c">7</text>
  <text x="32" y="207" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#c9a84c">6</text>
  <text x="32" y="259" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#c9a84c">5</text>
  <text x="32" y="311" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#c9a84c">4</text>
  <text x="32" y="363" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#c9a84c">3</text>
  <text x="32" y="415" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#c9a84c">2</text>
  <text x="32" y="467" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="13" font-weight="bold" fill="#c9a84c">1</text>

  <!-- Divider -->
  <line x1="50" y1="530" x2="490" y2="530" stroke="#30363d" stroke-width="1"/>

  <!-- Footer stats -->
  <text x="270" y="550" text-anchor="middle" font-family="'Segoe UI',Arial" font-size="11" fill="#58A6FF">
