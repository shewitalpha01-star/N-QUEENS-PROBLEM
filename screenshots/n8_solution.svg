  <rect x="50"  y="332" width="52" height="52" fill="#769656"/>
  <rect x="102" y="332" width="52" height="52" fill="#EEEED2"/>
  <rect x="154" y="332" width="52" height="52" fill="#769656"/>
  <rect x="206" y="332" width="52" height="52" fill="#EEEED2"/>
