  <rect x="310" y="332" width="52" height="52" fill="#EEEED2"/>
  <rect x="362" y="332" width="52" height="52" fill="#769656"/>
  <rect x="414" y="332" width="52" height="52" fill="#EEEED2"/>
  <!-- Row 6 -->
  <rect x="50"  y="384" width="52" height="52" fill="#EEEED2"/>
  <rect x="102" y="384" width="52" height="52" fill="#769656"/>
  <rect x="154" y="384" width="52" height="52" fill="#EEEED2"/>
  <rect x="206" y="384" width="52" height="52" fill="#769656"/>
  <rect x="258" y="384" width="52" height="52" fill="#EEEED2"/>
  <rect x="310" y="384" width="52" height="52" fill="#769656"/>
  <rect x="362" y="384" width="52" height="52" fill="#EEEED2"/>
  <rect x="414" y="384" width="52" height="52" fill="#769656"/>
